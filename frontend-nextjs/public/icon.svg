<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orbGrad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="orbGradLight" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
  </defs>
  <!-- Central circle -->
  <circle cx="16" cy="16" r="6" fill="url(#orbGrad)"/>
  <!-- Orbital ring -->
  <ellipse cx="16" cy="16" rx="14" ry="5.5" stroke="url(#orbGrad)" stroke-width="2" transform="rotate(-30 16 16)" fill="none"/>
  <!-- Orbital dot -->
  <circle cx="27.5" cy="9.5" r="2.5" fill="url(#orbGradLight)"/>
</svg>
