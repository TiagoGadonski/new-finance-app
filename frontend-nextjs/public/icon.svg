<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="icon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="110" fill="url(#bg-gradient)"/>

  <!-- Coin/Dollar symbol -->
  <circle cx="256" cy="230" r="120" fill="url(#icon-gradient)" opacity="0.2"/>
  <circle cx="256" cy="230" r="100" fill="none" stroke="url(#icon-gradient)" stroke-width="12"/>

  <!-- Dollar sign -->
  <path d="M 256 150 L 256 310" stroke="url(#icon-gradient)" stroke-width="16" stroke-linecap="round"/>
  <path d="M 220 180 Q 220 160 240 160 L 272 160 Q 292 160 292 180 Q 292 200 272 200 L 240 200 Q 220 200 220 220 Q 220 240 240 240 L 272 240 Q 292 240 292 260 Q 292 280 272 280 L 240 280 Q 220 280 220 260"
        fill="none" stroke="url(#icon-gradient)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Chart bars at bottom -->
  <rect x="140" y="380" width="40" height="60" rx="8" fill="url(#icon-gradient)" opacity="0.9"/>
  <rect x="200" y="350" width="40" height="90" rx="8" fill="url(#icon-gradient)" opacity="0.9"/>
  <rect x="260" y="330" width="40" height="110" rx="8" fill="url(#icon-gradient)" opacity="0.9"/>
  <rect x="320" y="360" width="40" height="80" rx="8" fill="url(#icon-gradient)" opacity="0.9"/>
</svg>
