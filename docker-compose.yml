version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: financeapp-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-financeapp}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - financeapp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: financeapp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - financeapp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financeapp-api
    ports:
      - "5000:8080"
      - "5001:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${DB_NAME:-financeapp};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-postgres}
      - ConnectionStrings__Redis=redis:6379
      - JwtSettings__SecretKey=${JWT_SECRET_KEY:-your-super-secret-key-change-this-in-production-minimum-32-characters-required}
      - JwtSettings__Issuer=${JWT_ISSUER:-FinanceApp}
      - JwtSettings__Audience=${JWT_AUDIENCE:-FinanceAppUsers}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:-Admin@123456}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - financeapp-network
    volumes:
      - ./logs:/app/logs

  frontend:
    build:
      context: ./frontend-nextjs
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    container_name: financeapp-frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - financeapp-network

volumes:
  postgres-data:
  redis-data:

networks:
  financeapp-network:
    driver: bridge
