version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: financeapp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: financeapp
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - financeapp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: financeapp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - financeapp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financeapp-api
    ports:
      - "5000:8080"
      - "5001:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=financeapp;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=redis:6379
      - JwtSettings__SecretKey=your-super-secret-key-change-this-in-production-minimum-32-characters-required
      - JwtSettings__Issuer=FinanceApp
      - JwtSettings__Audience=FinanceAppUsers
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - financeapp-network
    volumes:
      - ./logs:/app/logs

volumes:
  postgres-data:
  redis-data:

networks:
  financeapp-network:
    driver: bridge
