<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orbGrad" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="14.5" stroke="url(#orbGrad)" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Core sphere -->
  <circle cx="16" cy="16" r="7.5" fill="url(#orbGrad)"/>
  <!-- Highlight -->
  <circle cx="13.5" cy="13.5" r="2.5" fill="white" opacity="0.3"/>
  <!-- Orbital path -->
  <ellipse cx="16" cy="16" rx="14" ry="4.5" stroke="url(#orbGrad)" stroke-width="1.8" transform="rotate(-25 16 16)" fill="none"/>
  <!-- Orbiting body -->
  <circle cx="28" cy="10.5" r="2" fill="#4ade80"/>
  <circle cx="28" cy="10.5" r="3" fill="#4ade80" opacity="0.2"/>
</svg>
